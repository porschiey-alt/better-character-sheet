name: Release Module

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Update module.json version from tag
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          jq --arg v "$VERSION" '.version = $v' module.json > module.tmp && mv module.tmp module.json
          # Update manifest and download URLs to point at this release
          jq --arg v "$VERSION" \
            --arg repo "${{ github.repository }}" \
            '.manifest = "https://github.com/\($repo)/releases/latest/download/module.json" |
             .download = "https://github.com/\($repo)/releases/download/v\($v)/better-character-sheet-v\($v).zip"' \
            module.json > module.tmp && mv module.tmp module.json

      - name: Create release ZIP
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          mkdir -p package
          cp -r dist/ package/dist/
          cp -r templates/ package/templates/
          cp module.json package/
          cd package && zip -r ../better-character-sheet-v${VERSION}.zip . && cd ..

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            better-character-sheet-v*.zip
            package/module.json
          generate_release_notes: true
